name: Telegram Bot

on:
  workflow_dispatch:        # manual trigger from GitHub UI
  schedule:
    - cron: '0 */5 * * *'  # auto-restart every 5 hours

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 290    # runs ~5 hours then the next scheduled job takes over

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Configure git
        run: |
          git config --global user.email "bot@loom-agent.local"
          git config --global user.name "Loom Bot"
          git remote set-url origin https://${{ secrets.GITHUB_TOKEN }}@github.com/vtmhieu/loom.git

      - name: Run bot
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run python telegram_bot.py
